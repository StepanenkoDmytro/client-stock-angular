events {}

http {
    include /etc/nginx/mime.types;

    server {
        # Listen on port 80 inside the container — canonical nginx port.
        # docker-compose.yml maps host 81 → container 80.
        listen 80;
        # Accept any Host header (was hardcoded to pegazzo.online which broke
        # local access via http://localhost:81). Default _ matches everything.
        server_name _;

        location / {
            root /usr/share/nginx/html/;
            try_files $uri $uri/ /index.html;
        }

        index index.html;
    }
}
