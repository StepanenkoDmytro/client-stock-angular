<div class="nudge" role="status">
  <div class="nudge__text">
    <p class="nudge__headline">Your data is on this device only</p>
    <p class="nudge__body">Sign up to back it up across devices.</p>
  </div>
  <div class="nudge__actions">
    <button type="button"
            class="nudge__btn nudge__btn--primary"
            (click)="onSignUp()">
      Sign up
    </button>
    <button type="button"
            class="nudge__btn nudge__btn--ghost"
            (click)="onDismiss()">
      Not now
    </button>
  </div>
</div>
