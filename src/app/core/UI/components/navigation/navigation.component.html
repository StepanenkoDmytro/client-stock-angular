<nav class="navigation" role="navigation" aria-label="Main">
  <a class="navigation__slot"
     [routerLink]="['/', SAVINGS.path]"
     routerLinkActive="active"
     #savingsActive="routerLinkActive">
    <span class="navigation__icon-wrap">
      <mat-icon>{{ SAVINGS.icon }}</mat-icon>
    </span>
    <span class="navigation__label">{{ SAVINGS.label }}</span>
  </a>

  <a class="navigation__slot"
     [routerLink]="['/', SPENDING.path]"
     routerLinkActive="active"
     #spendingActive="routerLinkActive">
    <span class="navigation__icon-wrap">
      <mat-icon>{{ SPENDING.icon }}</mat-icon>
    </span>
    <span class="navigation__label">{{ SPENDING.label }}</span>
  </a>

  <button type="button"
          class="navigation__fab"
          aria-label="Add"
          (click)="onAddClick()">
    <pgz-add-btn
      [width]="48"
      [strokeColor]="'#FDFEFF'"
      [strokeWidth]="2"
      [backgroundColor]="'#243A95'">
    </pgz-add-btn>
  </button>

  <a class="navigation__slot"
     [routerLink]="['/', STATS.path]"
     routerLinkActive="active"
     #statsActive="routerLinkActive">
    <span class="navigation__icon-wrap">
      <mat-icon>{{ STATS.icon }}</mat-icon>
    </span>
    <span class="navigation__label">{{ STATS.label }}</span>
  </a>

  <a class="navigation__slot"
     [routerLink]="['/', PROFILE.path]"
     routerLinkActive="active"
     #profileActive="routerLinkActive">
    <span class="navigation__icon-wrap">
      <mat-icon>{{ PROFILE.icon }}</mat-icon>
    </span>
    <span class="navigation__label">{{ PROFILE.label }}</span>
  </a>
</nav>
