<pgz-settings-card>
    <pgz-settings-row label="Security"
                      [disabled]="true"
                      [showChevron]="false"></pgz-settings-row>

    <pgz-settings-row label="Language"
                      [muted]="true"
                      [value]="languageValue"></pgz-settings-row>

    <pgz-settings-row label="Theme"
                      [value]="themeValue"
                      (action)="changeTheme()"></pgz-settings-row>
</pgz-settings-card>
