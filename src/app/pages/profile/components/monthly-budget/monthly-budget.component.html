<section class="monthly-budget page">
    <pgz-page-header title="Monthly budget" [showBack]="true" (back)="prevRoute()"></pgz-page-header>

    <section class="mb-card">
        <div class="mb-row">
            <span class="mb-row__label">Monthly budget</span>
            <label class="mb-row__toggle">
                <input type="checkbox"
                       [checked]="isMonthlyBudgetEnabled"
                       (change)="toggleBudget()"/>
                <span class="mb-row__slider" aria-hidden="true"></span>
            </label>
        </div>

        @if (isMonthlyBudgetEnabled) {
            <div class="mb-field">
                <span class="mb-field__label">BUDGET AMOUNT</span>
                <div class="mb-field__control">
                    <input matInput
                           type="text"
                           inputmode="numeric"
                           placeholder="0"
                           class="mb-field__input"
                           [(ngModel)]="monthlyBudget"
                           pgzMoney/>
                    <span class="mb-field__suffix">$</span>
                </div>
            </div>

            <div class="mb-field">
                <span class="mb-field__label">RESET DAY</span>
                <div class="mb-field__control">
                    <input type="number"
                           min="1"
                           max="28"
                           placeholder="01"
                           class="mb-field__input"
                           [ngModel]="updateDay"/>
                </div>
            </div>
        }
    </section>

    <button mat-flat-button
            type="button"
            class="pgz-btn mb-submit montserrat pgz-btn--submit-enabled"
            (click)="save()">Save</button>

    <button type="button" class="mb-cancel" (click)="prevRoute()">Cancel</button>
</section>
