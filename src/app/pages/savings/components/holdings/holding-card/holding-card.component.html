<article class="hc" [class.hc--subcard]="variant === 'subcard'">
  <div class="hc__top">
    <span class="hc__symbol">{{ holding.instrument.symbol }}</span>
    @if (tagDots().length > 0) {
      <span class="hc__tag-dots" aria-label="Tags">
        @for (tag of tagDots(); track tag.id) {
          <span class="hc__tag-dot"
                [style.background-color]="tag.color"
                [title]="tag.name"></span>
        }
      </span>
    }
    <span class="hc__value">${{ formatNumber(currentValue()) }}</span>
  </div>

  <p class="hc__subline">{{ subline() }}</p>

  <hr class="hc__divider" />

  <div class="hc__lifetime">
    <span class="hc__pnl"
          [class.positive]="pnl() > 0"
          [class.negative]="pnl() < 0">
      {{ pnlSign() }}${{ formatNumber(abs(pnl())) }}
      ({{ pnlSign() }}{{ formatPercent(abs(pnlPercent())) }})
    </span>
    <span class="hc__period">lifetime · {{ periodLabel() }}</span>
    <!-- div/income — stub until M5.5 (CashFlow integration). Reserved
         visual slot so the row geometry doesn't reflow later. -->
    <span class="hc__income">div —</span>
  </div>
</article>
