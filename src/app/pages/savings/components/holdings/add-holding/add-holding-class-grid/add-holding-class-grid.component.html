<section class="page grid">
  <div (click)="goBack()">
    <pgz-prev-route>
      <p>Add saving</p>
    </pgz-prev-route>
  </div>

  <p class="grid__caption">WHAT ARE YOU ADDING?</p>

  <div class="grid__cards">
    @for (c of cards; track c.assetClass) {
      <button type="button"
              class="grid__card"
              [class.grid__card--disabled]="isCardDisabled(c.assetClass)"
              [attr.aria-disabled]="isCardDisabled(c.assetClass) ? 'true' : null"
              [style.--card-tint]="'var(' + c.tintVar + ')'"
              (click)="onPick(c.assetClass)">
        <mat-icon class="grid__card-icon">{{ c.icon }}</mat-icon>
        <span class="grid__card-label">{{ c.label }}</span>
        <span class="grid__card-sub">{{ c.subtitle }}</span>
      </button>
    }

    <!-- Liability kind (ADR-0009 / ADR-0013) — same grid, different kind.
         Slate-tinted, full-width; routes to the existing add-liability form. -->
    <button type="button"
            class="grid__card grid__card--liability"
            [style.--card-tint]="'var(--pgz-liability-slate)'"
            (click)="onPickLiability()">
      <mat-icon class="grid__card-icon">credit_card</mat-icon>
      <span class="grid__card-label">Mortgage &amp; loans</span>
      <span class="grid__card-sub">debt · what you owe</span>
    </button>

    <!-- Looping / Strategy kind (ADR-0013, composite) — indigo, full-width;
         routes to the add-loop form (mockup savings/17). -->
    <button type="button"
            class="grid__card grid__card--loop"
            [style.--card-tint]="'var(--strategy-loop)'"
            (click)="onPickLoop()">
      <mat-icon class="grid__card-icon">autorenew</mat-icon>
      <span class="grid__card-label">Strategy · Looping</span>
      <span class="grid__card-sub">DeFi leverage loop</span>
    </button>
  </div>

  <p class="grid__future-caption">FUTURE CLASSES</p>

  <div class="grid__cards grid__cards--future">
    @for (f of future; track f.label) {
      <button type="button"
              class="grid__card grid__card--future"
              (click)="onPickFuture(f.label)">
        <mat-icon class="grid__card-icon">{{ f.icon }}</mat-icon>
        <span class="grid__card-label">{{ f.label }}</span>
        <span class="grid__card-sub">coming</span>
      </button>
    }
  </div>
</section>
