<section class="page ah">
  <div (click)="onCancel()">
    <pgz-prev-route>
      <p>{{ title() }}</p>
    </pgz-prev-route>
  </div>

  <div class="ah__form">
    <pgz-class-chip-breadcrumb
      class="ah__breadcrumb"
      [assetClass]="assetClass()"
      [interactive]="!isEditMode()"
      (changeRequested)="onChangeClass()">
    </pgz-class-chip-breadcrumb>

    @switch (archetype()) {
      @case (Archetype.MARKET_BACKED) {
        <pgz-archetype-market-backed
          [assetClass]="assetClass()"
          [initialValue]="initialMarketBacked()"
          [readOnlyInstrument]="readOnlyInstrument()"
          (stateChange)="onArchetypeStateChange($event)">
        </pgz-archetype-market-backed>
      }
      @case (Archetype.MANUAL_CREATE) {
        <pgz-archetype-manual-create
          [assetClass]="assetClass()"
          [initialValue]="initialManualCreate()"
          [readOnlyInstrument]="readOnlyInstrument()"
          (stateChange)="onArchetypeStateChange($event)">
        </pgz-archetype-manual-create>
      }
      @case (Archetype.SINGLE_AMOUNT) {
        <pgz-archetype-single-amount
          [assetClass]="assetClass()"
          [initialValue]="initialSingleAmount()"
          (stateChange)="onArchetypeStateChange($event)">
        </pgz-archetype-single-amount>
      }
    }

    <div class="ah__actions">
      <button mat-stroked-button
              type="button"
              class="ah__cancel"
              (click)="onCancel()">
        Cancel
      </button>
      <button mat-flat-button
              color="primary"
              type="button"
              class="ah__save"
              [disabled]="!archetypeCanSave()"
              (click)="onSave()">
        {{ isEditMode() ? 'Save changes' : 'Save' }}
      </button>
    </div>

    @if (isEditMode()) {
      <pgz-topup-panel
        [currentQuantity]="currentQuantity()"
        [currentAveragePrice]="currentAveragePrice()"
        [currency]="currentCurrency()"
        (submitted)="onTopupSubmitted($event)">
      </pgz-topup-panel>
    }
  </div>
</section>
