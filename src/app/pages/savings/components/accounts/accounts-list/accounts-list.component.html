<section class="page al">
  <!-- M5.6 PR2: legacy pgz-prev-route → pgz-page-header. -->
  <pgz-page-header title="Manage accounts"
                   [showBack]="true"
                   (back)="goBack()"></pgz-page-header>

  <div class="al__body">
    <button mat-flat-button color="primary" class="al__add" (click)="onAdd()">
      <mat-icon>add</mat-icon>
      Add account
    </button>

    @if (accounts().length === 0) {
      <!-- M5.6 PR4: ad-hoc `.al__empty` → pgz-empty-state. -->
      <pgz-empty-state
        size="roomy"
        icon="🏦"
        title="No accounts yet"
        hint='Tap "Add account" to register an IBKR brokerage, Mono bank, Bybit exchange, or your own manual bucket.'></pgz-empty-state>
    } @else {
      <ul class="al__list">
        @for (a of accounts(); track a.id) {
          <li class="al__item" (click)="onEdit(a)">
            <div class="al__info">
              <p class="al__name">{{ displayName(a) }}</p>
              <p class="al__meta">
                <span class="al__type">{{ a.accountType }}</span>
                @if (a.provider) {
                  <span class="al__sep">·</span>
                  <span class="al__provider">{{ a.provider }}</span>
                }
                @if (a.currency) {
                  <span class="al__sep">·</span>
                  <span class="al__currency">{{ a.currency }}</span>
                }
              </p>
            </div>
            <div class="al__actions">
              <button mat-icon-button
                      aria-label="Edit"
                      (click)="onEdit(a); $event.stopPropagation()">
                <mat-icon>edit</mat-icon>
              </button>
              <button mat-icon-button
                      aria-label="Delete"
                      (click)="onDelete(a, $event)">
                <mat-icon>delete</mat-icon>
              </button>
            </div>
          </li>
        }
      </ul>
    }
  </div>
</section>
