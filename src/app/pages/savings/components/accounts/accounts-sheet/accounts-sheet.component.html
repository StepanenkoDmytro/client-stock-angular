<div class="sheet">
  <div class="sheet__handle" aria-hidden="true"></div>

  <header class="sheet__header">
    <div class="sheet__titles">
      <h2 class="sheet__title">Accounts</h2>
      <p class="sheet__subtitle">{{ subtitle() }}</p>
    </div>
    <button mat-icon-button
            aria-label="Close"
            class="sheet__close"
            (click)="onClose()">
      <mat-icon>close</mat-icon>
    </button>
  </header>

  <button type="button" class="sheet__add" (click)="onAdd()">
    + Add account
  </button>

  @if (sortedAccounts().length === 0) {
    <div class="sheet__empty">
      <p>No accounts yet.</p>
      <p class="sheet__empty-hint">Tap "+ Add account" to register a brokerage, exchange, bank or wallet.</p>
    </div>
  } @else {
    <ul class="sheet__list">
      @for (a of sortedAccounts(); track a.id) {
        <li class="sheet__item">
          <pgz-account-row
            [account]="a"
            (edit)="onEdit($event)"
            (delete)="onDelete($event)"
            (retry)="onRetry($event)">
          </pgz-account-row>
        </li>
      }
    </ul>
  }

  <button type="button" class="sheet__manage" (click)="onManageAll()">
    Manage all →
  </button>
</div>
