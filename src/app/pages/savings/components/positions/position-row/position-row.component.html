<div class="pr">
  <div class="pr__head">
    @if (holding.accountId) {
      <pgz-account-link-chip class="pr__account"
                             [accountId]="holding.accountId"></pgz-account-link-chip>
    } @else {
      <!-- No account on this holding — fall back to the legacy text label
           (e.g. seeded "Manual" cash) so the row never goes nameless. -->
      <span class="pr__name">{{ accountLabel() }}</span>
    }
    @if (chipLabel()) {
      <span class="pr__chip"
            [style.borderColor]="flag().colorVar"
            [style.color]="flag().colorVar">{{ chipLabel() }}</span>
    }
    <span class="pr__value"
          [class.pr__value--flash-up]="flashDirection() === 'up'"
          [class.pr__value--flash-down]="flashDirection() === 'down'">${{ formatNumber(value) }}</span>
    <button mat-icon-button
            type="button"
            class="pr__more"
            aria-label="Holding actions"
            [matMenuTriggerFor]="menu">
      <mat-icon>more_horiz</mat-icon>
    </button>
    <mat-menu #menu="matMenu">
      <button mat-menu-item type="button" (click)="onEdit()">
        <mat-icon>edit</mat-icon>
        <span>Edit</span>
      </button>
      <button mat-menu-item type="button" (click)="onDelete()">
        <mat-icon>delete_outline</mat-icon>
        <span>Delete</span>
      </button>
    </mat-menu>
  </div>
  <div class="pr__meta">{{ metaLine() }}</div>
</div>
