<section class="st" aria-label="Statistics">
  <!-- Page header. "Updated Xh ago" stays as a placeholder copy until
       we wire a real "last sync" signal — same pattern Savings header
       uses today (see savings/components/holdings/portfolio-summary). -->
  <header class="st__header">
    <h1 class="st__title">Statistics</h1>
    <span class="st__updated" aria-hidden="true">Updated just now</span>
  </header>

  <!-- Sticky anchor nav. Buttons (not <a> hash-links) — we manage scroll
       with smooth behaviour ourselves to avoid the URL bar growing a
       fragment on every tap. role="tablist" approximates the semantic
       even though the sections live on one scrollable page. -->
  <nav class="st__anchors" role="tablist" aria-label="Statistics sections">
    @for (anchor of anchors; track anchor.id) {
      <button
        type="button"
        role="tab"
        class="st__anchor"
        [class.st__anchor--active]="activeSection() === anchor.id"
        [attr.aria-selected]="activeSection() === anchor.id"
        [attr.aria-controls]="anchor.id"
        (click)="scrollTo(anchor.id)">
        {{ anchor.label }}
        <span class="st__anchor-underline" aria-hidden="true"></span>
      </button>
    }
  </nav>

  <!-- ====== Section 1 · Performance ====== -->
  <!-- Data-driven (frontend-only, anonymous-safe): pgz-stats-performance-
       section computes from local holdings → positions → FX. Renders
       nominal all-time P&L, gain-by-class donut and top movers. The
       inflation-adjusted real-return hero, period toggle (1Y/3Y/…) and
       dividend/interest income need a portfolio-history / payments
       backend (Wave 2) — surfaced inside the component as "coming soon",
       not faked. Mockup: design/analytics/07-statistics-performance-mobile.svg. -->
  <article
    #sectionEl
    id="performance"
    class="st__section"
    role="tabpanel"
    aria-labelledby="performance-caption">
    <p id="performance-caption" class="st__caption">
      PERFORMANCE · HOW YOUR PORTFOLIO EARNS
    </p>

    <pgz-stats-performance-section></pgz-stats-performance-section>
  </article>

  <!-- ====== Section 2 · Risk ====== -->
  <article
    #sectionEl
    id="risk"
    class="st__section"
    role="tabpanel"
    aria-labelledby="risk-caption">
    <p id="risk-caption" class="st__caption">
      RISK · WHAT TO KEEP AN EYE ON
    </p>
    <pgz-stats-risk-section></pgz-stats-risk-section>
  </article>

  <!-- ====== Section 3 · Goals ====== -->
  <!-- Data-driven (frontend-only, anonymous-safe): pgz-stats-goals-section
       projects the user's current portfolio value forward across 3 return
       scenarios + a user-set monthly contribution (what-if), and reads
       goals from the localStorage GoalsService. Auto-detecting a saving
       rate needs income / net-worth history (Wave 2) → surfaced as a
       manual control. Mockup: design/analytics/09-statistics-goals-mobile.svg. -->
  <article
    #sectionEl
    id="goals"
    class="st__section"
    role="tabpanel"
    aria-labelledby="goals-caption">
    <p id="goals-caption" class="st__caption">
      GOALS · WHERE YOUR CAPITAL IS HEADING
    </p>
    <pgz-stats-goals-section></pgz-stats-goals-section>
  </article>
</section>
