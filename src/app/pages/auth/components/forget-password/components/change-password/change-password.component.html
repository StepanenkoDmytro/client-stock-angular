<section class="change-form">
  <p class="auth-subtitle">Change password</p>

  <section class="auth-card">
    <form class="auth-form" [formGroup]="form" (ngSubmit)="handleSubmit()">
      <mat-form-field class="auth-form--field" appearance="outline">
        <mat-label>New password</mat-label>
        <input [formControl]="passwordCtrl"
               [type]="passwordHide ? 'password' : 'text'"
               matInput
               (blur)="checkPasswordValidity()">
        <button mat-icon-button matSuffix
                type="button"
                (click)="passwordHide = !passwordHide"
                [attr.aria-label]="passwordHide ? 'Show password' : 'Hide password'"
                [attr.aria-pressed]="!passwordHide">
          <mat-icon>{{ passwordHide ? 'visibility_off' : 'visibility' }}</mat-icon>
        </button>
      </mat-form-field>

      <mat-form-field class="auth-form--field" appearance="outline">
        <mat-label>Repeat password</mat-label>
        <input [formControl]="repeatPasswordCtrl"
               [type]="repeatPasswordHide ? 'password' : 'text'"
               matInput
               (blur)="checkPasswordValidity()">
        <button mat-icon-button matSuffix
                type="button"
                (click)="repeatPasswordHide = !repeatPasswordHide"
                [attr.aria-label]="repeatPasswordHide ? 'Show password' : 'Hide password'"
                [attr.aria-pressed]="!repeatPasswordHide">
          <mat-icon>{{ repeatPasswordHide ? 'visibility_off' : 'visibility' }}</mat-icon>
        </button>
      </mat-form-field>

      <div class="auth-form--errors">
        @if (invalidPasswordErrorMessage) {
          <p class="auth-form--error">{{ invalidPasswordErrorMessage }}</p>
        }
        @if (passwordCtrl.value.length === 0 || repeatPasswordCtrl.value.length === 0) {
          <p class="auth-form--error">Password can not be empty</p>
        }
      </div>
    </form>
  </section>

  <button mat-flat-button
          type="submit"
          class="pgz-btn auth-btn--submit montserrat"
          [class.pgz-btn--submit-enabled]="isValidityPassword.value"
          [class.pgz-btn--submit-disabled]="!isValidityPassword.value"
          [disabled]="!isValidityPassword.value"
          (click)="handleSubmit()">Update password</button>
</section>
